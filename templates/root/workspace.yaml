version: 1

workspace:
  docs_directory: docs
  projects_directory: projects
  worktrees_directory: worktrees
  # setup: ["pnpm install"] # $PWD is the session workspace; PH_WORKSPACE_BASE is this root
  # cleanup: ["docker compose down"]

agents:
  orchestrator: { model: bifrost/main }
  impl: { model: bifrost/code }
  impl-lite: { model: bifrost/code-lite }
  explore: { model: bifrost/main }
  backfill: { model: bifrost/main }

subagents:
  async_by_default: true
  tool_description_mode: compact
  completion_batch: true
  intercom_bridge_mode: always
  supervisor_output: compact

permissions:
  default: allow
  shell: allow
  mcp: allow
  external_directories: ask

code_graph:
  server_name: codebase-memory
  lifecycle: lazy
  idle_timeout: 10

# Each project may also declare setup and cleanup command arrays for session worktrees.
# Hooks run with their worktree as $PWD and receive PH_PROJECT_BASE, so a hook can copy
# ignored local state without Git-path tricks, e.g. `cp "$PH_PROJECT_BASE/.env" .env`.
projects: []
